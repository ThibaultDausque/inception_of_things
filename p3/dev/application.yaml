apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: dev
spec:
  project: default
  source:
    repoURL: https://github.com/ThibaultDausque/dev.git
    targetRevision: main
    path: v2
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
