global:
  edition: ce

  hosts:
    domain: gitlab.local
    externalIP: 127.0.0.1

  ingress:
    configureCertmanager: false

    tls:
      enabled: false

  minio:
    enabled: false

  redis:
    host: redis-master.gitlab.svc.cluster.local

  psql:
    host: postgres-postgresql.gitlab.svc.cluster.local
    password:
      secret: postgres-postgresql
      key: postgres-password

  appConfig:
    object_store:
      enabled: true
      connection:
        secret: gitlab-minio-secret
        key: config

    artifacts:
      enabled: true
      bucket: gitlab-backups

    uploads:
      enabled: true
      bucket: gitlab-backups

    packages:
      enabled: true
      bucket: gitlab-backups

    lfs:
      enabled: true
      bucket: gitlab-backups

    backups:
      bucket: gitlab-backups
      tmpBucket: gitlab-tmp

registry:
  enabled: false

prometheus:
  install: false

registry:
  enabled: false

gitlab-runner:
  install: false

nginx-ingress:
  enabled: false

certmanager-issuer:
  email: aroullea@student.42angouleme.fr

gitlab:
  webservice:
    minReplicas: 1
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 600Mi

  sidekiq:
    minReplicas: 1
    resources:
      requests:
        memory: 300Mi
      limits:
        memory: 600Mi

  toolbox:
    backups:
      objectStorage:
        backend: s3
        config:
          secret: gitlab-minio-secret
          key: config

  gitlab-shell:
    minReplicas: 1
    resources:
      requests:
        memory: 100Mi

  kas:
    minReplicas: 1
    resources:
      requests:
        memory: 100Mi

gitaly:
  resources:
    requests:
      memory: 200Mi
    limits:
      memory: 400Mi
