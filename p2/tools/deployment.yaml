apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: nginx:1.24
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: app1-dir
      volumes:
      - name: app1-dir
        hostPath:
          path: /vagrant/tools
---

apiVersion: v1
kind: Service
metadata:
  name: app1-service
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
      - name: app2
        image: nginx:1.24
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: app2-dir
      volumes:
      - name: app2-dir
        hostPath:
          path: /vagrant/tools

---

apiVersion: v1
kind: Service
metadata:
  name: app2-service
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3-1
        image: nginx:1.24
        command: ["/bin/sh", "-c", "sed -i 's/listen 80;/listen 8081;/g' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
        ports:
        - containerPort: 8081
        volumeMounts:
        - mountPath: /usr/share/nginx/html/app1.html
          name: app3-file
      - name: app3-2
        image: nginx:1.24
        command: ["/bin/sh", "-c", "sed -i 's/listen 80;/listen 8082;/g' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
        ports:
        - containerPort: 8082
        volumeMounts:
        - mountPath: /usr/share/nginx/html/app2.html
          name: app3-file
      - name: app3-3
        image: nginx:1.24
        command: ["/bin/sh", "-c", "sed -i 's/listen 80;/listen 8083;/g' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
        ports:
        - containerPort: 8083
        volumeMounts:
        - mountPath: /usr/share/nginx/html/app3.html
          name: app3-file
      volumes:
      - name: app3-file
        hostPath:
          path: /vagrant/tools

---
apiVersion: v1
kind: Service
metadata:
  name: app3-service
spec:
  selector:
    app: nginx
  ports:
    - name: app3-1
      protocol: TCP
      port: 80
      targetPort: 8081
    - name: app3-2
      protocol: TCP
      port: 81
      targetPort: 8082
    - name: app3-3
      protocol: TCP
      port: 82
      targetPort: 8083
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app1-ingress
spec:
  rules:
    - host: app1
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: app1-service
                port:
                  number: 80
    - host: app2
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: app2-service
                port:
                  number: 80
    - host: app3
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: app3-service
                port:
                  number: 80
                
