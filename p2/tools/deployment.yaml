apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: nginx:1.24
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: app1-dir
        - mountPath: /usr/share/nginx/html/app1.html
          name: app1-file
      volumes:
      - name: app1-dir
        hostPath:
          path: /vagrant/tools
          type: DirectoryOrCreate
      - name: app1-file
        hostPath:
          path: /vagrant/tools/app1.html
          type: FileOrCreate

